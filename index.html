<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BizLedger Pro — Business Management Suite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { margin: 0; background: #0f0f0f; }
    #app-loader {
      position: fixed; inset: 0; background: #0f0f0f;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; gap: 20px; transition: opacity .4s ease;
    }
    #app-loader.hide { opacity: 0; pointer-events: none; }
    .loader-logo {
      width: 52px; height: 52px; border-radius: 14px;
      background: #fff; display: flex; align-items: center;
      justify-content: center; font-size: 18px; font-weight: 800;
      font-family: monospace; color: #111;
    }
    .loader-bar {
      width: 160px; height: 3px; background: rgba(255,255,255,.1);
      border-radius: 99px; overflow: hidden;
    }
    .loader-bar-fill {
      height: 100%; background: #fff; border-radius: 99px;
      animation: loaderFill .85s cubic-bezier(.4,0,.2,1) forwards;
    }
    .loader-text {
      color: rgba(255,255,255,.35); font-size: 11px;
      font-family: monospace; letter-spacing: .1em;
    }
    @keyframes loaderFill { from { width:0% } to { width:100% } }
  </style>
</head>
<body>
  <!-- Splash loader shown before React mounts -->
  <div id="app-loader">
    <div class="loader-logo">BL</div>
    <div class="loader-bar"><div class="loader-bar-fill"></div></div>
    <div class="loader-text">BIZLEDGER PRO</div>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
